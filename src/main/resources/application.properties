spring.application.name=backend-bambino
spring.config.import=optional:file:.env[.properties]
app.upload.dir=${UPLOAD_DIR:/app/uploads}
app.public-base-url=${APP_PUBLIC_BASE_URL:http://localhost:8080}

spring.datasource.url=${SPRING_DATASOURCE_URL}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.hibernate.ddl-auto=none
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.show-sql=false

spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration

server.port=8080
server.compression.enabled=true
server.compression.mime-types=application/json,text/html,text/xml,text/plain,text/css,text/javascript,application/javascript
server.compression.min-response-size=1024

springdoc.api-docs.enabled=false
springdoc.swagger-ui.enabled=false

# smtp para envio de codigo de recuperacion
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${SPRING_MAIL_USERNAME}
spring.mail.password=${SPRING_MAIL_PASSWORD}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

# control de envio de correo de recuperacion
seguridad.recuperacion.correo.habilitado=true
seguridad.recuperacion.correo.desde=${SPRING_MAIL_FROM}

# control de envio de comprobantes por correo
comprobantes.correo.habilitado=${COMPROBANTES_CORREO_HABILITADO:true}
comprobantes.correo.host=${COMPROBANTES_MAIL_HOST:smtp.gmail.com}
comprobantes.correo.port=${COMPROBANTES_MAIL_PORT:587}
comprobantes.correo.username=${COMPROBANTES_MAIL_USERNAME:${SPRING_MAIL_USERNAME}}
comprobantes.correo.password=${COMPROBANTES_MAIL_PASSWORD:${SPRING_MAIL_PASSWORD}}
comprobantes.correo.desde=${COMPROBANTES_MAIL_FROM:${SPRING_MAIL_FROM}}
comprobantes.correo.smtp-auth=${COMPROBANTES_MAIL_SMTP_AUTH:true}
comprobantes.correo.starttls=${COMPROBANTES_MAIL_STARTTLS:true}

# cobertura delivery (centro: bambino chicken)
delivery.cobertura.centro.latitud=-12.1847986
delivery.cobertura.centro.longitud=-76.998044
delivery.cobertura.radio-km=10.0

# culqi (public key se expone al frontend; secret key solo se usa en backend)
culqi.public-key=${CULQI_PUBLIC_KEY:}
culqi.secret-key=${CULQI_SECRET_KEY:}
culqi.api-base-url=${CULQI_API_BASE_URL:https://api.culqi.com}
culqi.checkout-script-url=${CULQI_CHECKOUT_SCRIPT_URL:https://js.culqi.com/checkout-js}
culqi.currency=${CULQI_CURRENCY:PEN}
culqi.minimum-order-amount=${CULQI_MIN_ORDER_AMOUNT:6.00}
culqi.sandbox-phone-number=${CULQI_SANDBOX_PHONE_NUMBER:900000001}

# factiliza (token privado para consultas DNI/RUC)
factiliza.api-token=${FACTILIZA_API_TOKEN:}
factiliza.api-base-url=${FACTILIZA_API_BASE_URL:https://api.factiliza.com/v1}
factiliza.timeout-seconds=${FACTILIZA_TIMEOUT_SECONDS:10}

# limite de carga multipart (imagenes/archivos admin web)
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# cache para recursos publicos servidos por /uploads/**
app.upload.cache.max-age-seconds=2592000
